# ==========================================
# Shared Configurations
# ==========================================

_envs: &envs
  HCCL_BUFFSIZE: "512"
  SERVER_PORT: "DEFAULT_PORT"
  HCCL_OP_EXPANSION_MODE: "AIV"
  OMP_PROC_BIND: "false"
  OMP_NUM_THREADS: "1"
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  TASK_QUEUE_ENABLE: "1"
  VLLM_ASCEND_ENABLE_MLAPO: "1"
  VLLM_ASCEND_ENABLE_FLASHCOMM1: "1"
  VLLM_ASCEND_ENABLE_NZ: "1"

_server_cmd: &server_cmd
  - "--enable-expert-parallel"
  - "--no-enable-prefix-caching"
  - "--enable-chunked-prefill"
  - "--allowed-local-media-path"
  - "/"
  - "--tensor-parallel-size"
  - "4"
  - "--data-parallel-size"
  - "4"
  - "--port"
  - "$SERVER_PORT"
  - "--max-model-len"
  - "32768"
  - "--max-num-batched-tokens"
  - "16384"
  - "--max-num-seqs"
  - "500"
  - "--async-scheduling"
  - "--quantization"
  - "ascend"
  - "--trust-remote-code"
  - "--gpu-memory-utilization"
  - "0.9"
  - "--seed"
  - "42"
  - "--compilation-config"
  - '{"cudagraph_capture_sizes":[48,64,80,96,112,128], "cudagraph_mode":"FULL_DECODE_ONLY"}'
  - "--speculative-config"
  - '{"method":"eagle3", "model":"lightseekorg/kimi-k2.5-eagle3", "num_speculative_tokens":3}'
  - "--additional-config"
  - '{"enable_shared_expert_dp":true}'
  - "--mm-processor-cache-gb"
  - "0"
  - "--mm-encoder-tp-mode"
  - "data"

_benchmarks: &benchmarks
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K-in3500-bs2800
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 392
    max_out_len: 1500
    batch_size: 98
    trust_remote_code: true
    request_rate: 0
    baseline: 1
    threshold: 0.97
  acc:
    case_type: accuracy
    dataset_path: vllm-ascend/gsm8k-lite
    request_conf: vllm_api_general_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_chat_prompt
    max_out_len: 4096
    batch_size: 8
    baseline: 90
    threshold: 5

# ==========================================
# ACTUAL TEST CASES
# ==========================================

test_cases:
  - name: "Kimi-K2.5-W4A8-Case"
    model: "Eco-Tech/Kimi-K2.5-W4A8"
    envs:
      <<: *envs
    server_cmd: *server_cmd
    benchmarks:
      <<: *benchmarks
