      - "--profiler-config"
      - '{"profiler":"torch","torch_profiler_dir":"./profile","torch_profiler_with_stack":false}'
      - "--seed"
      - "1024"
      - --max-model-len
      - "131072"
      - --additional-config
      - '{"recompute_scheduler_enable": true, "fuse_muls_add": true, "ascend_compilation_config": {"enable_npugraph_ex": true}}'
      - --max-num-batched-tokens
      - "4096"
      - --trust-remote-code
      - --max-num-seqs
      - "64"
      - --quantization
      - ascend
      - --gpu-memory-utilization
      - "0.95"
      - --enforce-eager
      - --enable-auto-tool-choice
      - --tool-call-parser
      - glm47
      - --reasoning-parser
      - glm45
      - --kv-transfer-config
      - '{"kv_connector": "MooncakeConnectorV1",
        "kv_role": "kv_producer",
        "kv_port": "30000",
        "kv_connector_extra_config": {
          "use_ascend_direct": true,
          "prefill": {
            "dp_size": 4,
            "tp_size": 8
          },
          "decode": {
            "dp_size": 8,
            "tp_size": 4
          }
        }}'

  - node_index: 2
    envs:
      <<: *env_common
      VLLM_ASCEND_ENABLE_MLAPO: "1"
      TASK_QUEUE_ENABLE: "1"
    server_cmd_template:
      - --host
      - "0.0.0.0"
