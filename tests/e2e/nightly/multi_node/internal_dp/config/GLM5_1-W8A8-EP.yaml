                            "dp_size": 4,
                            "tp_size": 8
                    },
                    "decode": {
                            "dp_size": 8,
                            "tp_size": 4
                    }
              }
          }'
  -
    envs:
      VLLM_ASCEND_ENABLE_MLAPO: 1
      TASK_QUEUE_ENABLE: 1
    server_cmd: >
      vllm serve Eco-Tech/GLM-5.1-w8a8
          --host 0.0.0.0
          --port $SERVER_PORT
          --data-parallel-size 8
          --data-parallel-size-local 4
          --data-parallel-start-rank 4
          --headless        
          --data-parallel-address $MASTER_IP
          --data-parallel-rpc-port 10543
          --tensor-parallel-size 4
          --enable-expert-parallel
          --speculative-config '{"num_speculative_tokens": 3,  "method":"deepseek_mtp"}'
          --profiler-config
          '{"profiler": "torch",
          "torch_profiler_dir": "./vllm_profile",
          "torch_profiler_with_stack": false}'
          --seed 1024
          --max-model-len 202752
          --max-num-batched-tokens 32
          --compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY", "cudagraph_capture_sizes":[4, 8, 12, 16,20,24,28, 32]}'
          --additional-config '{"recompute_scheduler_enable": true, "fuse_muls_add": true, "ascend_compilation_config": {"enable_npugraph_ex": true}}'
          --trust-remote-code
          --max-num-seqs 8
