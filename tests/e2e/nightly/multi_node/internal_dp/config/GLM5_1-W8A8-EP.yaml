test_name: "multi-node-GLM-5.1-w8a8-EP"
model: "Eco-Tech/GLM-5.1-w8a8"
num_nodes: 4
npu_per_node: 16
env_common:
  HCCL_OP_EXPANSION_MODE: "AIV"
  VLLM_USE_MODELSCOPE: true
  SERVER_PORT: 8080
  OMP_PROC_BIND: false
  OMP_NUM_THREADS: 1
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  HCCL_BUFFSIZE: 1024
  VLLM_TORCH_PROFILER_WITH_STACK: 0
  ASCEND_AGGREGATE_ENABLE: 1
  ASCEND_TRANSPORT_PRINT: 1
  ACL_OP_INIT_MODE: 1
  ASCEND_A3_ENABLE: 1
  VLLM_NIXL_ABORT_REQUEST_TIMEOUT: 300000
  VLLM_ENGINE_READY_TIMEOUT_S: 7200
  HCCL_CONNECT_TIMEOUT: 1200
  HCCL_INTRA_PCIE_ENABLE: 1
  HCCL_INTRA_ROCE_ENABLE: 0
  VLLM_ASCEND_ENABLE_FUSED_MC2: 1

special_dependencies:
  transformers: "5.2.0"

disaggregated_prefill:
  enabled: true
  prefiller_host_index: [0, 1]
  decoder_host_index: [2, 3]
# TODO: need to identify why TP and mtp+1 divisibility rules break on dual-node case

deployment:
  -
    envs:
      VLLM_ASCEND_ENABLE_FLASHCOMM1: 1
    server_cmd: >
      vllm serve Eco-Tech/GLM-5.1-w8a8
          --host 0.0.0.0
          --port $SERVER_PORT
          --data-parallel-size 4
          --data-parallel-size-local 2
          --data-parallel-start-rank 0
          --data-parallel-address $LOCAL_IP
          --data-parallel-rpc-port 10521
          --tensor-parallel-size 8
          --enable-expert-parallel
          --speculative-config '{"num_speculative_tokens": 3, "method":"deepseek_mtp"}'
          --profiler-config
          '{"profiler": "torch",
          "torch_profiler_dir": "./vllm_profile",
          "torch_profiler_with_stack": false}'
          --seed 1024
          --max-model-len 131072
          --additional-config '{"recompute_scheduler_enable": true, "fuse_muls_add": true, "ascend_compilation_config": {"enable_npugraph_ex": true}}'
          --max-num-batched-tokens 4096
          --trust-remote-code
          --max-num-seqs 64
          --quantization ascend
          --gpu-memory-utilization 0.95
          --enforce-eager
          --enable-auto-tool-choice
          --tool-call-parser glm47
          --reasoning-parser glm45
          --kv-transfer-config
          '{"kv_connector": "MooncakeConnectorV1",
          "kv_role": "kv_producer",
          "kv_port": "30000",
          "engine_id": "0",
          "kv_connector_extra_config": {
                    "use_ascend_direct": true,
                    "prefill": {
                            "dp_size": 4,
                            "tp_size": 8
                    },
                    "decode": {
                            "dp_size": 8,
                            "tp_size": 4
                    }
              }
          }'
  -
    envs:
      VLLM_ASCEND_ENABLE_FLASHCOMM1: 1
    server_cmd: >
      vllm serve Eco-Tech/GLM-5.1-w8a8
          --host 0.0.0.0
          --headless
          --port $SERVER_PORT
          --data-parallel-size 4
          --data-parallel-size-local 2
          --data-parallel-start-rank 2
          --data-parallel-address $MASTER_IP
          --data-parallel-rpc-port 10521
          --tensor-parallel-size 8
          --enable-expert-parallel
          --speculative-config '{"num_speculative_tokens": 3, "method":"deepseek_mtp"}'
          --profiler-config
          '{"profiler": "torch",
          "torch_profiler_dir": "./vllm_profile",
          "torch_profiler_with_stack": false}'
          --seed 1024
          --max-model-len 131072
          --additional-config '{"recompute_scheduler_enable": true, "fuse_muls_add": true, "ascend_compilation_config": {"enable_npugraph_ex": true}}'
          --max-num-batched-tokens 4096
          --trust-remote-code
          --max-num-seqs 64
          --quantization ascend
          --gpu-memory-utilization 0.95
          --enforce-eager
          --enable-auto-tool-choice
          --tool-call-parser glm47
          --reasoning-parser glm45
          --kv-transfer-config
          '{"kv_connector": "MooncakeConnectorV1",
          "kv_role": "kv_producer",
          "kv_port": "30000",
          "engine_id": "0",
          "kv_connector_extra_config": {
                    "use_ascend_direct": true,
                    "prefill": {
                            "dp_size": 4,
                            "tp_size": 8
                    },
                    "decode": {
                            "dp_size": 8,
                            "tp_size": 4
                    }
              }
          }'
  -
    envs:
      VLLM_ASCEND_ENABLE_MLAPO: 1
      TASK_QUEUE_ENABLE: 1
    server_cmd: >
      vllm serve Eco-Tech/GLM-5.1-w8a8
          --host 0.0.0.0
          --port $SERVER_PORT
          --data-parallel-size 8
          --data-parallel-size-local 4
          --data-parallel-start-rank 0
          --data-parallel-address $LOCAL_IP
          --data-parallel-rpc-port 10543
          --tensor-parallel-size 4
          --enable-expert-parallel
          --speculative-config '{"num_speculative_tokens": 3,  "method":"deepseek_mtp"}'
          --profiler-config
          '{"profiler": "torch",
          "torch_profiler_dir": "./vllm_profile",
          "torch_profiler_with_stack": false}'
          --seed 1024
          --max-model-len 202752
          --max-num-batched-tokens 32
          --compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY", "cudagraph_capture_sizes":[4, 8, 12, 16,20,24,28, 32]}'
          --additional-config '{"recompute_scheduler_enable": true, "fuse_muls_add": true, "ascend_compilation_config": {"enable_npugraph_ex": true}}'
          --trust-remote-code
          --max-num-seqs 8
          --gpu-memory-utilization 0.92
          --quantization ascend
          --enable-auto-tool-choice
