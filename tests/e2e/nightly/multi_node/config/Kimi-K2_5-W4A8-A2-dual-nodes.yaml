test_name: "test Kimi-K2.5-W4A8 A2 dual nodes"
model: "Eco-Tech/Kimi-K2.5-W4A8"
num_nodes: 2
npu_per_node: 8

env_common:
  HCCL_OP_EXPANSION_MODE: AIV
  HCCL_INTRA_PCIE_ENABLE: 1
  HCCL_INTRA_ROCE_ENABLE: 0
  PYTORCH_NPU_ALLOC_CONF: expandable_segments:True
  OMP_PROC_BIND: false
  OMP_NUM_THREADS: 1
  TASK_QUEUE_ENABLE: 1
  HCCL_BUFFSIZE: 512
  VLLM_ASCEND_ENABLE_MLAPO: 1
  VLLM_ASCEND_ENABLE_FLASHCOMM1: 1
  VLLM_USE_MODELSCOPE: true
  SERVER_PORT: 8080

deployment:
  - server_cmd: >
      vllm serve Eco-Tech/Kimi-K2.5-W4A8
        --host 0.0.0.0
        --port $SERVER_PORT
        --quantization ascend
        --allowed-local-media-path /
        --trust-remote-code
        --no-enable-prefix-caching
        --seed 42
        --data-parallel-size 2
        --data-parallel-size-local 1
        --data-parallel-start-rank 0
        --data-parallel-address $LOCAL_IP
        --data-parallel-rpc-port 13389
        --tensor-parallel-size 8
        --enable-expert-parallel
        --async-scheduling
        --max-num-seqs 64
        --max-model-len 51200
        --max-num-batched-tokens 8192
        --gpu-memory-utilization 0.9
        --compilation-config '{"cudagraph_capture_sizes":[16,32,128,160,256], "cudagraph_mode":"FULL_DECODE_ONLY"}'
        --speculative-config '{"method":"eagle3", "model":"lightseekorg/kimi-k2.5-eagle3", "num_speculative_tokens":3}'
        --mm-processor-cache-gb 0
        --mm-encoder-tp-mode data

  - server_cmd: >
      vllm serve Eco-Tech/Kimi-K2.5-W4A8
        --host 0.0.0.0
        --headless
        --port $SERVER_PORT
        --quantization ascend
        --allowed-local-media-path /
        --trust-remote-code
        --no-enable-prefix-caching
        --seed 42
        --data-parallel-size 2
        --data-parallel-size-local 1
        --data-parallel-start-rank 1
        --data-parallel-address $MASTER_IP
        --data-parallel-rpc-port 13389
        --tensor-parallel-size 8
        --enable-expert-parallel
        --async-scheduling
        --max-num-seqs 64
        --max-model-len 51200
        --max-num-batched-tokens 8192
        --gpu-memory-utilization 0.9
        --compilation-config '{"cudagraph_capture_sizes":[16,32,128,160,256], "cudagraph_mode":"FULL_DECODE_ONLY"}'
        --speculative-config '{"method":"eagle3", "model":"lightseekorg/kimi-k2.5-eagle3", "num_speculative_tokens":3}'
        --mm-processor-cache-gb 0
        --mm-encoder-tp-mode data

benchmarks:
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K-in3500-bs2800
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 320
    max_out_len: 1500
    batch_size: 80
    trust_remote_code: True
    request_rate: 0
    baseline: 1
    threshold: 0.97
