test_name: "multi-node-GLM-5.1-w8a8-A3"
model: "Eco-Tech/GLM-5.1-w8a8"
num_nodes: 2
npu_per_node: 16
env_common:
  HCCL_OP_EXPANSION_MODE: "AIV"
  OMP_PROC_BIND: false
  VLLM_USE_MODELSCOPE: true
  OMP_NUM_THREADS: 1
  HCCL_BUFFSIZE: 200
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  VLLM_ASCEND_BALANCE_SCHEDULING: 0
  VLLM_ASCEND_ENABLE_MLAPO: 1
  SERVER_PORT: 8080

special_dependencies:
  transformers: "5.2.0"
# TODO: need to identify why TP and mtp+1 divisibility rules break on dual-node case

deployment:
  -
    server_cmd: >
      vllm serve Eco-Tech/GLM-5.1-w8a8
      --host 0.0.0.0
      --port $SERVER_PORT
      --data-parallel-size 2
      --tensor-parallel-size 16
      --data-parallel-rpc-port 13389
      --data-parallel-size-local 1
      --data-parallel-address $LOCAL_IP
      --enable-expert-parallel
      --seed 1024
      --max-num-seqs 48
      --max-model-len 20480
      --max-num-batched-tokens 4096
      --trust-remote-code
      --gpu-memory-utilization 0.95
      --quantization ascend
      --enable-chunked-prefill
      --no-enable-prefix-caching
      --async-scheduling
      --additional-config '{"enable_npugraph_ex": true,"fuse_muls_add":true,"multistream_overlap_shared_expert":true,"fuse_qknorm_rope":false}'
      --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY","cudagraph_capture_sizes": [1,4,8,12,16,20,24,28,32,36,48,60,72]}'
      --speculative-config '{"num_speculative_tokens": 3, "method": "deepseek_mtp"}'
  -
    server_cmd: >
      vllm serve Eco-Tech/GLM-5.1-w8a8
      --host 0.0.0.0
      --port $SERVER_PORT
      --data-parallel-size 2
      --tensor-parallel-size 16
      --data-parallel-size-local 1
      --data-parallel-start-rank 1
      --headless
      --data-parallel-address $MASTER_IP
      --enable-expert-parallel
      --seed 1024
      --max-num-seqs 48
      --max-model-len 20480
      --max-num-batched-tokens 4096
      --trust-remote-code
      --gpu-memory-utilization 0.95
      --quantization ascend
      --enable-chunked-prefill
      --no-enable-prefix-caching
      --async-scheduling
      --additional-config '{"enable_npugraph_ex": true,"fuse_muls_add":true,"multistream_overlap_shared_expert":true,"fuse_qknorm_rope":false}'
      --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY","cudagraph_capture_sizes": [1,4,8,12,16,20,24,28,32,36,48,60,72]}'
      --speculative-config '{"num_speculative_tokens": 3, "method": "deepseek_mtp"}'
benchmarks:
  acc_GPQA:
    case_type: accuracy
    dataset_path: vllm-ascend/gpqa
    request_conf: vllm_api_general_chat
    dataset_conf: gpqa/gpqa_gen_0_shot_cot_chat_prompt
    max_out_len: 32768
    batch_size: 32
    baseline: 85.35
    threshold: 5

  acc_aime2025:
    case_type: accuracy
    dataset_path: vllm-ascend/aime2025
    request_conf: vllm_api_general_chat
    dataset_conf: aime2025/aime2025_gen_0_shot_chat_prompt
    max_out_len: 72348
    batch_size: 32
    baseline: 90
    threshold: 5

  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K_prefix90_in131072_bs100
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 12
    max_out_len: 1024
    batch_size: 3
    request_rate: 0
    baseline: 1
    threshold: 0.97