# ==========================================
# Shared Configurations
# ==========================================

_envs: &envs
  HCCL_OP_EXPANSION_MODE: "AIV"
  OMP_PROC_BIND: "false"
  OMP_NUM_THREADS: "1"
  HCCL_BUFFSIZE: "200"
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  VLLM_ASCEND_BALANCE_SCHEDULING: "1"
  VLLM_ASCEND_ENABLE_MLAPO: "1"
  SERVER_PORT: "DEFAULT_PORT"

_server_cmd: &server_cmd
  - "--enable-expert-parallel"
  - "--tensor-parallel-size"
  - "16"
  - "--data-parallel-size"
  - "1"
  - "--port"
  - "$SERVER_PORT"
  - "--seed"
  - "1024"
  - "--max-num-batched-tokens"
  - "4096"
  - "--trust-remote-code"
  - "--quantization"
  - "ascend"
  - "--enable-chunked-prefill"
  - "--async-scheduling"
  - "--additional-config"
  - '{"enable_npugraph_ex": true,"fuse_muls_add":true,"multistream_overlap_shared_expert":true}'
  - "--compilation-config"
  - '{"cudagraph_mode": "FULL_DECODE_ONLY"}'
  - "--speculative-config"
  - '{"num_speculative_tokens": 3, "method": "deepseek_mtp"}'


_benchmarks: &benchmarks
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K_prefix0_in16384_bs100_glm5
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 20
    max_out_len: 1024
    batch_size: 5
    request_rate: 0
    baseline: 1
    threshold: 0.97

_benchmarks_bs8: &benchmarks_bs8
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K_prefix0_in32768_bs100_glm5
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 8
    max_out_len: 512
    batch_size: 2
    request_rate: 0
    baseline: 1
    threshold: 0.97

_benchmarks_bs32: &benchmarks_bs32
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K_prefix90_in32768_bs100_glm5
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 32
    max_out_len: 512
    batch_size: 8
    request_rate: 0
    baseline: 1
    threshold: 0.97

_benchmarks_bs10: &benchmarks_bs10
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K_prefix90_in65536_bs100_glm5
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 10
    max_out_len: 1024
    batch_size: 5
    request_rate: 0
    baseline: 1
    threshold: 0.97
