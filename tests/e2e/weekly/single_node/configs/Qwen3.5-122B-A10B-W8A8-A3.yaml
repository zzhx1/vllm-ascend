# ==========================================
# ACTUAL TEST CASES
# ==========================================

_envs: &envs
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  HCCL_OP_EXPANSION_MODE: "AIV"
  HCCL_BUFFSIZE: "1024"
  OMP_NUM_THREADS: "1"
  TASK_QUEUE_ENABLE: "1"
  VLLM_ASCEND_ENABLE_FUSED_MC2: "1"
  VLLM_ASCEND_ENABLE_FLASHCOMM1: "1"
  SERVER_PORT: "DEFAULT_PORT"

_server_cmd: &server_cmd
  - "--port"
  - "$SERVER_PORT"
  - "--data-parallel-size"
  - "1"
  - "--tensor-parallel-size"
  - "4"
  - "--enable-expert-parallel"
  - "--max-num-seqs"
  - "128"
  - "--gpu-memory-utilization"
  - "0.9"
  - "--no-enable-prefix-caching"
  - "--trust-remote-code"
  - "--allowed-local-media-path"
  - "/"
  - "--quantization"
  - "ascend"
  - "--mm-processor-cache-gb"
  - "0"
  - "--additional-config"
  - '{"enable_cpu_binding": true, "enable_shared_expert_dp": true}'

_benchmark_acc: &_benchmark_acc
  acc_GPQA:
    case_type: accuracy
    dataset_path: vllm-ascend/gpqa
    request_conf: vllm_api_general_chat
    dataset_conf: gpqa/gpqa_gen_0_shot_cot_chat_prompt
    max_out_len: 32768
    batch_size: 32
    baseline: 85
    threshold: 5
    thinking: true
    temperature: 1.0
    top_p: 0.95
    top_k: 20
    min_p: 0.0
    presence_penalty: 1.5
    repetition_penalty: 1.0
    ignore_eos: false
  acc_aime2025:
    case_type: accuracy
    dataset_path: vllm-ascend/aime2025
    request_conf: vllm_api_general_chat
    dataset_conf: aime2025/aime2025_gen_0_shot_chat_prompt
    max_out_len: 32768
    batch_size: 32
    baseline: 90
    threshold: 5
    thinking: true
    temperature: 1.0
    top_p: 0.95
    top_k: 20
    min_p: 0.0
    presence_penalty: 1.5
    repetition_penalty: 1.0
    ignore_eos: false

_benchmark_TPOT50_16K_1K: &_benchmark_TPOT50_16K_1K
  case_type: performance
  dataset_path: vllm-ascend/GSM8K_prefix0_in16384_bs200_qwen
  request_conf: vllm_api_stream_chat
  dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
  num_prompts: 96
  max_out_len: 1024
  batch_size: 24
  request_rate: 0
  baseline: 1
  threshold: 0.97

