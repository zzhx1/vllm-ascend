# ==========================================
# Shared Configurations
# ==========================================

_envs: &envs
  HCCL_BUFFSIZE: "512"
  SERVER_PORT: "DEFAULT_PORT"
  HCCL_OP_EXPANSION_MODE: "AIV"
  OMP_PROC_BIND: "false"
  OMP_NUM_THREADS: "1"
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  TASK_QUEUE_ENABLE: "1"
  VLLM_ASCEND_ENABLE_MLAPO: "1"
  VLLM_ASCEND_ENABLE_FLASHCOMM1: "1"
  VLLM_ASCEND_ENABLE_NZ: "1"

_server_cmd: &server_cmd
  - "--enable-expert-parallel"
  - "--allowed-local-media-path"
  - "/"
  - "--tensor-parallel-size"
  - "4"
  - "--data-parallel-size"
  - "4"
  - "--port"
  - "$SERVER_PORT"
  - "--quantization"
  - "ascend"
  - "--trust-remote-code"
  - "--gpu-memory-utilization"
  - "0.9"
  - "--seed"
  - "42"
  - "--mm-processor-cache-gb"
  - "0"
  - "--mm-encoder-tp-mode"
  - "data"

_benchmark_acc: &_benchmark_acc
  acc_aime2025:
    case_type: accuracy
    dataset_path: vllm-ascend/aime2025
    request_conf: vllm_api_general_chat
    dataset_conf: aime2025/aime2025_gen_0_shot_chat_prompt
    max_out_len: 32768
    batch_size: 32
    baseline: 90
    threshold: 5

_benchmark_TPOT50_3_5k_1_5k: &_benchmark_TPOT50_3_5k_1_5k
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K-in3500-bs2800
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 392
    max_out_len: 1500
    batch_size: 98
    trust_remote_code: true
    request_rate: 0
    baseline: 1
    threshold: 0.97

_benchmark_TPOT50_16K_1K: &_benchmark_TPOT50_16K_1K
  case_type: performance
  dataset_path: vllm-ascend/GSM8K_prefix0_in16384_bs200_kimi
  request_conf: vllm_api_stream_chat
  dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
  num_prompts: 56
  max_out_len: 1024
  batch_size: 14
  trust_remote_code: true
  request_rate: 0
  baseline: 1
  threshold: 0.97

_benchmark_TPOT20_16K_1K: &_benchmark_TPOT20_16K_1K
