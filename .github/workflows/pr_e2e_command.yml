name: Handle /e2e Command

on:
  repository_dispatch:
    types: [e2e-command]

defaults:
  run:
    shell: bash -el {0}

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  e2e-test:
    name: Run /e2e tests
    runs-on: linux-amd64-cpu-8-hk
    outputs:
      pr_sha: ${{ steps.resolve.outputs.pr_sha }}
      test_groups: ${{ steps.groups.outputs.test_groups }}
      has_tests: ${{ steps.groups.outputs.has_tests }}
    steps:
      - name: Check user authorization
        id: auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ACTOR='${{ github.event.client_payload.github.payload.comment.user.login }}'
          PR_AUTHOR='${{ github.event.client_payload.pull_request.user.login }}'
          REPO='${{ github.event.client_payload.github.payload.repository.full_name }}'

          # Allow PR author
          if [ "$ACTOR" = "$PR_AUTHOR" ]; then
            echo "User $ACTOR is the PR author, authorized."
            echo "authorized=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Allow users with triage+ permission
          PERMISSION=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.permission')
          case "$PERMISSION" in
            triage|write|maintain|admin)
              echo "User $ACTOR has $PERMISSION permission, authorized."
              echo "authorized=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::User $ACTOR is not the PR author and does not have triage+ permission."
              echo "authorized=false" >> "$GITHUB_OUTPUT"
              exit 1
              ;;
          esac

      - name: Resolve PR info and test names
        id: resolve
        run: |
          PR_SHA='${{ github.event.client_payload.pull_request.head.sha }}'
          echo "pr_sha=$PR_SHA" >> "$GITHUB_OUTPUT"

          ALL_ARGS="${{ github.event.client_payload.slash_command.args.all }}"
          echo "all_args=$ALL_ARGS" >> "$GITHUB_OUTPUT"

      - name: Validate test paths
        id: validate
        env:
          ALL_ARGS: ${{ steps.resolve.outputs.all_args }}
        run: |
          TESTS=$(echo "$ALL_ARGS" | tr '\n' ' ' | xargs)
          for TEST in $TESTS; do
            case "$TEST" in
              tests/e2e/pull_request/*)
                ;;
              *)
                echo "::error::Unsupported test path: $TEST"
                echo "Only tests under tests/e2e/pull_request/ are supported."
                exit 1
                ;;
            esac
          done
          echo "All test paths are valid."
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"

      - name: Categorize tests by runner
        id: groups
        env:
          TEST_LIST: ${{ steps.validate.outputs.tests }}
        run: |
          echo "All specified tests: $TEST_LIST"

          SINGLECARD_TESTS=""
          MULTICARD_2_TESTS=""
          MULTICARD_4_TESTS=""
          P310_SINGLECARD_TESTS=""
          P310_MULTICARD_TESTS=""

          for TEST in $TEST_LIST; do
            if echo "$TEST" | grep -q "four_card/_310p"; then
              P310_MULTICARD_TESTS="$P310_MULTICARD_TESTS $TEST"
            elif echo "$TEST" | grep -q "_310p"; then
              P310_SINGLECARD_TESTS="$P310_SINGLECARD_TESTS $TEST"
            elif echo "$TEST" | grep -q "four_card"; then
              MULTICARD_4_TESTS="$MULTICARD_4_TESTS $TEST"
            elif echo "$TEST" | grep -q "two_card"; then
              MULTICARD_2_TESTS="$MULTICARD_2_TESTS $TEST"
            else
              SINGLECARD_TESTS="$SINGLECARD_TESTS $TEST"
            fi
          done

          python3 - <<'PY'
          import json, os

          specs = [
              ("SINGLECARD_TESTS", 1, "a2", "linux-aarch64-a2b3-1", "9.0.0-910b-ubuntu22.04-py3.11"),
              ("MULTICARD_2_TESTS", 2, "a3", "linux-aarch64-a3-2", "9.0.0-a3-ubuntu22.04-py3.11"),
              ("MULTICARD_4_TESTS", 4, "a3", "linux-aarch64-a3-4", "9.0.0-a3-ubuntu22.04-py3.11"),
              ("P310_SINGLECARD_TESTS", 1, "310p", "linux-aarch64-310p-1", "9.1.0-beta.1-310p-ubuntu22.04-py3.11"),
              ("P310_MULTICARD_TESTS", 4, "310p", "linux-aarch64-310p-4", "9.1.0-beta.1-310p-ubuntu22.04-py3.11"),
          ]
          groups = []
          for env_name, num_npus, npu_type, runner, image_tag in specs:
              tests = " ".join(os.environ.get(env_name, "").split())
              if tests:
                  groups.append({
                      "num_npus": num_npus,
                      "npu_type": npu_type,
                      "runner": runner,
                      "tests": tests,
                      "image_tag": image_tag,
                  })
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              print(f"has_tests={str(bool(groups)).lower()}", file=f)
              print(f"test_groups={json.dumps(groups, separators=(',', ':'))}", file=f)
          PY

  trigger-selected-tests:
    name: e2e-comment (${{ matrix.vllm_version }})
    strategy:
      fail-fast: false
      matrix:
        vllm_version: [9090368b650896bf5fc990c921df7eb4c20355a5, v0.20.2]
    needs: [e2e-test]
    if: ${{ needs.e2e-test.outputs.has_tests == 'true' }}
    uses: ./.github/workflows/_selected_tests.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      ref: ${{ needs.e2e-test.outputs.pr_sha }}
      test_groups: ${{ needs.e2e-test.outputs.test_groups }}

  report:
    name: Report result on PR
    needs: [e2e-test, trigger-selected-tests]
    if: always() && needs.e2e-test.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Add reaction
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          reactions: ${{ (needs.trigger-selected-tests.result == 'success' || needs.trigger-selected-tests.result == 'skipped') && 'hooray' || 'confused' }}

      - name: Create comment
        if: needs.trigger-selected-tests.result == 'success' || needs.trigger-selected-tests.result == 'skipped'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          issue-number: ${{ github.event.client_payload.github.payload.issue.number }}
          body: |
            /e2e command completed. Check the [workflow run](https://github.com/${{ github.event.client_payload.github.payload.repository.full_name }}/actions) for details.
          reactions: hooray
