name: E2E-Light

on:
  pull_request:
    branches:
      - 'main'
      - '*-dev'
      - 'releases/v*'

# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

# only cancel in-progress runs of the same workflow
# and ignore the lint / 1 card / 4 cards test type
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/_pre_commit.yml
    with:
      vllm: 9090368b650896bf5fc990c921df7eb4c20355a5

  select-tests:
    needs: lint
    if: ${{ needs.lint.result == 'success' }}
    runs-on: linux-amd64-cpu-8-hk
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend:nightly-cpu
    outputs:
      has_tests: ${{ steps.scope.outputs.has_tests }}
      test_groups: ${{ steps.scope.outputs.test_groups }}
      matched_modules: ${{ steps.scope.outputs.matched_modules }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate test coverage config
        run: |
          pip install pyyaml
          python3 .github/workflows/scripts/coverage.py

      - name: Select tests based on changed files
        id: scope
        run: |
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          git fetch origin ${{ github.base_ref }}
          pip install regex
          python3 .github/workflows/scripts/select_tests.py \
            --diff-base origin/${{ github.base_ref }} \
            --run-all-cpu \
            --e2e-type light

  run-selected-tests:
    needs: select-tests
    if: ${{ needs.select-tests.outputs.has_tests == 'true' && !contains(github.event.pull_request.labels.*.name, 'ready') }}
    strategy:
      matrix:
        vllm_version: [9090368b650896bf5fc990c921df7eb4c20355a5, v0.20.2]
    uses: ./.github/workflows/_selected_tests.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      test_groups: ${{ needs.select-tests.outputs.test_groups }}
