# Selective test scope configuration.
#
# Maps source code paths to test directories for both UT and E2E tests.
# When a PR changes files under a source_file_dependencies path, the
# corresponding test directories are selected to run.
#
# Runner routing conventions:
#   UT (tests/ut/):
#     <module>/            -> CPU runner (default)
#     <module>/a2/         -> A2 NPU x1
#     <module>/a2_2/       -> A2 NPU x2
#     <module>/a3_2/       -> A3 NPU x2
#     <module>/a3_4/       -> A3 NPU x4
#     <module>/310p/       -> 310P NPU
#   E2E (tests/e2e/):
#     All E2E tests run on NPU. Routing is by directory structure:
#     pull_request/{light,full}/{one_card,two_card[s],four_card[s]}/  -> matched by card count
#     310p/{singlecard,multicard}/                              -> 310P runner
#
# Fields:
#   name: Module identifier
#   optional: true (triggered only when matched) or false (always triggered)
#   base: Optional module name or list of module names to inherit from
#   source_file_dependencies: List of source/test directories whose changes
#                             trigger the tests
#   exclude_source_file_dependencies: Optional list of source/test directories
#                                     to exclude from source_file_dependencies
#   tests: List of test directories/files to run
#   skip_tests: List of test files to skip (matched against individual test
#                paths after directory scanning)

