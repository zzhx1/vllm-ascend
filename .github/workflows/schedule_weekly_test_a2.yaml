name: Weekly-A2

on:
  schedule:
      # Run doctest at 00:00 Beijing time (UTC+8) every Sunday
      - cron: "0 16 * * 6"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ascend-weekly-${{ github.ref }}-a2
  cancel-in-progress: true

jobs:
  doc-test:
    name: doc-test
    uses: ./.github/workflows/labeled_doctest.yaml
    with:
      doc_versions: '["v0.18.0","latest"]'
