name: Handle /rerun Command

on:
  repository_dispatch:
    types: [rerun-command]

permissions:
  contents: read
  actions: write
  pull-requests: write
  issues: write

jobs:
  rerun:
    name: Re-run failed CI jobs
    runs-on: ubuntu-latest
    outputs:
      rerun_count: ${{ steps.rerun.outputs.rerun_count }}
    steps:
      - name: Check user authorization
        id: auth
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          ACTOR='${{ github.event.client_payload.github.payload.comment.user.login }}'
          PR_AUTHOR='${{ github.event.client_payload.pull_request.user.login }}'
          REPO='${{ github.event.client_payload.github.payload.repository.full_name }}'

          if [ "$ACTOR" = "$PR_AUTHOR" ]; then
            echo "User $ACTOR is the PR author, authorized."
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            ROLE_NAME=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.role_name' 2>/dev/null || true)
            case "$ROLE_NAME" in
              triage|write|maintain|admin)
                echo "authorized=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "::error::User $ACTOR is not the PR author and does not have triage+ permission."
                echo "authorized=false" >> "$GITHUB_OUTPUT"
                ;;
            esac
          fi

      - name: Post unauthorized comment
        if: steps.auth.outputs.authorized == 'false'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          body: |
            [Bot]: rerun command failed: you do not have permission. Only the PR author or users with triage+ permission can trigger /rerun.
          reactions: confused

      - name: Fail if unauthorized
        if: steps.auth.outputs.authorized == 'false'
        run: exit 1

      - name: Re-run failed jobs
        id: rerun
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          PR_SHA='${{ github.event.client_payload.pull_request.head.sha }}'
          REPO='${{ github.event.client_payload.github.payload.repository.full_name }}'

          FAILED_RUNS=$(gh api "repos/$REPO/actions/runs?head_sha=$PR_SHA&status=completed&conclusion=failure&per_page=50" \
            --jq '.workflow_runs[] | "\(.id)|\(.name)"')

          if [ -z "$FAILED_RUNS" ]; then
            echo "No failed workflow runs found for SHA $PR_SHA."
            echo "rerun_count=0" >> "$GITHUB_OUTPUT"
          fi

          COUNT=0
          while IFS= read -r RUN; do
            RUN_ID=$(echo "$RUN" | cut -d'|' -f1)
            RUN_NAME=$(echo "$RUN" | cut -d'|' -f2)
            echo "Re-running failed jobs in $RUN_NAME (ID: $RUN_ID)..."
            gh api "repos/$REPO/actions/runs/$RUN_ID/rerun-failed-jobs" -X POST --silent
            COUNT=$((COUNT + 1))
          done <<< "$FAILED_RUNS"

          echo "Successfully re-ran failed jobs in $COUNT workflow run(s)."
          echo "rerun_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Comment result on PR
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          body: |
            [Bot]: rerun completed.

            - **Re-ran failed jobs in**: ${{ steps.rerun.outputs.rerun_count }} workflow run(s)
            - **Ref**: `${{ github.event.client_payload.pull_request.head.sha }}`
            - **Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          reactions: hooray
