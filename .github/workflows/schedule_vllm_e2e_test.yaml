name: E2E-upstream

on:
  schedule:
    - cron: '0 8 * * 0' # every Sunday at 8:00

# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

# only cancel in-progress runs of the same workflow
# and ignore the lint / 1 card / 4 cards test type
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_INDEX_STRATEGY: unsafe-best-match
  UV_NO_CACHE: 1
  UV_SYSTEM_PYTHON: 1

jobs:
    e2e-upstream:
        runs-on: linux-aarch64-a2b3-1
        strategy:
          fail-fast: false
          matrix:
            part: [0, 1, 2, 3]
            vllm: [v0.19.0]
        container:
          image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.1-910b-ubuntu22.04-py3.11
          env:
            VLLM_LOGGING_LEVEL: ERROR
            HF_HUB_OFFLINE: 0
        steps:
          - name: Checkout vllm-project/vllm-ascend repo
            uses: actions/checkout@v4
          - name: Check npu and CANN info
            run: |
              npu-smi info
              cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info

          - name: Config mirrors
            run: |
              sed -Ei 's@(ports|archive).ubuntu.com@cache-service.nginx-pypi-cache.svc.cluster.local:8081@g' /etc/apt/sources.list
              pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
              pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
              apt-get update -y
              apt install git -y

          - name: Install system dependencies
            run: |
              apt-get -y install `cat packages.txt`
              apt-get -y install gcc g++ cmake libnuma-dev clang-15
              git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
              update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 20
              update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-15 20
              pip install uv

          - name: Checkout vllm-project/vllm repo
            uses: actions/checkout@v4
            with:
              repository: vllm-project/vllm
              ref: ${{ matrix.vllm }}
              path: ./vllm-empty
              fetch-depth: 1

          - name: Install vllm-project/vllm from source
            working-directory: ./vllm-empty
            run: |
              VLLM_TARGET_DEVICE=empty uv pip install -e .
              sed -i '5i\import vllm_ascend.patch.platform\nimport vllm_ascend.patch.worker' tests/conftest.py

          - name: Install vllm-project/vllm-ascend
            env:
              PIP_EXTRA_INDEX_URL: https://mirrors.huaweicloud.com/ascend/repos/pypi
            run: |
              pip install uc-manager
              uv pip install -r requirements-dev.txt
              uv pip install -v -e .
              uv pip install tblib mteb runai_model_streamer pqdm timm

          - name: Run vllm-project/vllm test
            env:
              PYTORCH_NPU_ALLOC_CONF: max_split_size_mb:256
              VLLM_WORKER_MULTIPROC_METHOD: spawn
            run: |
                python3 .github/workflows/scripts/run_suite.py \
                  --suite e2e-upstream-singlecard \
                  --auto-partition-id "${{ matrix.part }}" \
                  --auto-partition-size 4 \
                  --continue-on-error
