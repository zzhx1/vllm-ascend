name: E2E-Comment

on:
  pull_request:
    branches:
      - 'main'
      - '*-dev'
      - 'releases/v*'
    types: [ labeled, synchronize ]

defaults:
  run:
    shell: bash -el {0}

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parse-trigger:
    name: Parse /e2e comment
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ready') }}
    uses: ./.github/workflows/_parse_trigger.yaml
    with:
      parse_e2e_comment: true

  prepare-selected-tests:
    name: Prepare selected tests
    needs: [parse-trigger]
    if: ${{ needs.parse-trigger.outputs.allowed == 'true' }}
    runs-on: linux-amd64-cpu-8-hk
    outputs:
      test_groups: ${{ steps.groups.outputs.test_groups }}
      has_tests: ${{ steps.groups.outputs.has_tests }}
    steps:
      - name: Build selected test groups
        id: groups
        env:
          SINGLECARD_TESTS: ${{ needs.parse-trigger.outputs.singlecard_tests }}
          MULTICARD_2_TESTS: ${{ needs.parse-trigger.outputs.multicard_2_tests }}
          MULTICARD_4_TESTS: ${{ needs.parse-trigger.outputs.multicard_4_tests }}
          P310_SINGLECARD_TESTS: ${{ needs.parse-trigger.outputs.p310_singlecard_tests }}
          P310_MULTICARD_TESTS: ${{ needs.parse-trigger.outputs.p310_multicard_tests }}
        run: |
          python3 - <<'PY'
          import json
          import os

          specs = [
              ("SINGLECARD_TESTS", 1, "a2", "linux-aarch64-a2b3-1", "9.0.0-910b-ubuntu22.04-py3.12"),
              ("MULTICARD_2_TESTS", 2, "a3", "linux-aarch64-a3-2", "9.0.0-a3-ubuntu22.04-py3.12"),
              ("MULTICARD_4_TESTS", 4, "a3", "linux-aarch64-a3-4", "9.0.0-a3-ubuntu22.04-py3.12"),
              ("P310_SINGLECARD_TESTS", 1, "310p", "linux-aarch64-310p-1", "9.1.0-beta.1-310p-ubuntu22.04-py3.12"),
              ("P310_MULTICARD_TESTS", 4, "310p", "linux-aarch64-310p-4", "9.1.0-beta.1-310p-ubuntu22.04-py3.12"),
          ]
          groups = []
          for env_name, num_npus, npu_type, runner, image_tag in specs:
              tests = " ".join(os.environ.get(env_name, "").split())
              if tests:
                  groups.append({
                      "num_npus": num_npus,
                      "npu_type": npu_type,
                      "runner": runner,
                      "tests": tests,
                      "image_tag": image_tag,
                  })
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              print(f"has_tests={str(bool(groups)).lower()}", file=f)
              print(f"test_groups={json.dumps(groups, separators=(',', ':'))}", file=f)
          PY

  e2e-comment-test:
    name: e2e-comment (${{ matrix.vllm_version }})
    strategy:
      fail-fast: false
      matrix:
        vllm_version: [9090368b650896bf5fc990c921df7eb4c20355a5, v0.20.2]
    needs: [parse-trigger, prepare-selected-tests]
    if: ${{ needs.prepare-selected-tests.outputs.has_tests == 'true' }}
    uses: ./.github/workflows/_selected_tests.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      ref: ${{ needs.parse-trigger.outputs.pr_sha }}
      test_groups: ${{ needs.prepare-selected-tests.outputs.test_groups }}
