name: Selected Tests

on:
  workflow_call:
    inputs:
      vllm:
        type: string
        required: true
        description: 'The vllm commit hash or tag to test.'
      test_groups:
        type: string
        required: true
        description: 'JSON array of test groups from select_tests.py'
      ref:
        type: string
        required: false
        default: ''
        description: 'The vllm-ascend ref to test.'

# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  selected-tests:
    name: ${{ matrix.group.npu_type }}-${{ matrix.group.num_npus }}card
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJSON(inputs.test_groups) }}
    runs-on: ${{ matrix.group.runner }}
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:${{ matrix.group.image_tag }}
      env:
        VLLM_LOGGING_LEVEL: ERROR
        VLLM_USE_MODELSCOPE: True
        HF_HUB_OFFLINE: 1
        MAX_JOBS: 4
        UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
        UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi http://cache-service.nginx-pypi-cache.svc.cluster.local/whl/cpu/"
        UV_INDEX_STRATEGY: unsafe-best-match
        UV_INSECURE_HOST: cache-service.nginx-pypi-cache.svc.cluster.local
        UV_HTTP_TIMEOUT: 120
        UV_NO_CACHE: 1
        UV_SYSTEM_PYTHON: 1
    env:
      CSRC_BUILD_CACHE_IMAGE: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:${{ matrix.group.image_tag }}
    steps:
      - name: Check NPU availability
        id: check_npu
        if: ${{ matrix.group.npu_type != 'cpu' }}
        run: |
          npu-smi info
          echo "has_npu=true" >> "$GITHUB_OUTPUT"

      - name: Install packages
        run: |
          sed -Ei 's@(ports|archive).ubuntu.com@cache-service.nginx-pypi-cache.svc.cluster.local:8081@g' /etc/apt/sources.list
          pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
          apt-get update -y
          apt-get install -y python3-pip git vim wget net-tools gcc g++ cmake libnuma-dev curl gnupg2 zstd clang-15 ninja-build
          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 20
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-15 20
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          pip install uv

      - name: Checkout vllm-project/vllm repo
        uses: actions/checkout@v6
        with:
          repository: vllm-project/vllm
          ref: ${{ inputs.vllm }}
          path: ./vllm-empty

      - name: Install vllm-project/vllm from source
        working-directory: ./vllm-empty
        run: |
          VLLM_TARGET_DEVICE=empty uv pip install .
          pip uninstall -y triton

      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Rebase on latest main
        run: |
          git config user.name "vllm-ascend-ci"
          git config user.email "vllm-ascend-ci@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main

      - name: Get csrc build cache base branch
        id: get_csrc_build_cache_base_branch
        run: |
          base_branch="${GITHUB_BASE_REF:-${GITHUB_REF_NAME:-unknown-branch}}"
          base_branch=$(printf "%s" "$base_branch" | tr '/:@ ' '----' | tr -cd 'A-Za-z0-9._-')
          if [ -z "$base_branch" ]; then
            base_branch="unknown-branch"
          fi
          echo "base_branch=$base_branch" >> "$GITHUB_OUTPUT"

      - name: Get current cache time
        id: get_cache_time
        run: |
          cache_time=$(date -u +'%Y%m%d%H%M%S')
          echo "cache_time=$cache_time" >> "$GITHUB_OUTPUT"

      - name: Get csrc build cache arch
        id: get_csrc_build_cache_arch
        shell: bash
        run: |
          arch="$(uname -m)"
          case "$arch" in
            aarch64|arm64)
              cache_arch="ARM64"
              ;;
            x86_64|amd64)
              cache_arch="X64"
              ;;
            *)
              cache_arch="$arch"
              ;;
          esac
          echo "cache_arch=$cache_arch" >> "$GITHUB_OUTPUT"

      - name: Restore vllm-ascend csrc build cache
        id: restore-csrc-build-cache
        if: ${{ steps.check_npu.outputs.has_npu == 'true' }}
        uses: runs-on/cache/restore@v5
        with:
          path: |
            csrc/build
          key: vllm-ascend-build-ninja-v1-${{ steps.get_csrc_build_cache_base_branch.outputs.base_branch }}-${{ runner.os }}-${{ steps.get_csrc_build_cache_arch.outputs.cache_arch }}-${{ env.CSRC_BUILD_CACHE_IMAGE }}-${{ steps.get_cache_time.outputs.cache_time }}
          restore-keys: |
            vllm-ascend-build-ninja-v1-${{ steps.get_csrc_build_cache_base_branch.outputs.base_branch }}-${{ runner.os }}-${{ steps.get_csrc_build_cache_arch.outputs.cache_arch }}-${{ env.CSRC_BUILD_CACHE_IMAGE }}-

      - name: Install Mooncake wheel
        if: ${{ matrix.group.npu_type != 'cpu' }}
        run: |
          set -euxo pipefail

          apt-get install -y --no-install-recommends \
            libibverbs1 \
            ibverbs-providers \
            librdmacm1 \
            libnuma1 \
            libcurl4
          ldconfig

          MOONCAKE_WHEEL="mooncake_transfer_engine_ascend-0.3.8.post1-cp312-cp312-manylinux_2_17_aarch64.manylinux_2_35_aarch64.whl"
          pip install --no-cache-dir --no-deps \
            "https://vllm-ascend.obs.cn-north-4.myhuaweicloud.com/vllm-ascend/${MOONCAKE_WHEEL}"

          pip show mooncake-transfer-engine-ascend || true

      - name: Install vllm-project/vllm-ascend with device
        if: ${{ matrix.group.npu_type != 'cpu' }}
        run: |
          CACHE_HIT="${{ steps.restore-csrc-build-cache.outputs.cache-hit }}"
          if [ -n "$CACHE_HIT" ]; then
            echo "CSRC cache restored from cache: $CACHE_HIT"
          else
            echo "CSRC cache miss: no cache entry found"
          fi
          export MAX_JOBS=$(( ${{ matrix.group.num_npus }} * 23 ))
          pip install uc-manager
          uv pip install -r requirements-dev.txt
          uv pip install --force-reinstall --no-deps triton-ascend==3.2.1
          uv pip install -e .

      - name: Install vllm-project/vllm-ascend no device
        if: ${{ matrix.group.npu_type == 'cpu' }}
        env:
          SOC_VERSION: ascend910b1
          COMPILE_CUSTOM_KERNELS: 0
        run: |
          pip install uc-manager
          uv pip install -r requirements-dev.txt
          uv pip install -e .

      - name: Uninstall Triton for 310P tests
        if: ${{ matrix.group.npu_type != 'cpu' && matrix.group.npu_type == '310p' }}
        run: |
          pip uninstall -y triton-ascend triton

      - name: Run selected tests with device
        if: ${{ matrix.group.npu_type != 'cpu' }}
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
        run: |
          . /usr/local/Ascend/ascend-toolkit/set_env.sh
          .github/workflows/scripts/run_selected_tests.sh \
            "${{ matrix.group.npu_type }}" \
            "${{ matrix.group.num_npus }}" \
            "with-device" \
            ${{ matrix.group.tests }}

      - name: Run selected tests without device
        if: ${{ matrix.group.npu_type == 'cpu' }}
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
          TORCH_DEVICE_BACKEND_AUTOLOAD: 0
        run: |
          .github/workflows/scripts/run_selected_tests.sh \
            "${{ matrix.group.npu_type }}" \
            "${{ matrix.group.num_npus }}" \
            "without-device" \
            ${{ matrix.group.tests }}

      - name: Upload selected test logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: selected-test-logs-vllm-${{ inputs.vllm }}-${{ matrix.group.npu_type }}-${{ matrix.group.num_npus }}card
          path: ${{ runner.temp }}/selected-tests-*
          if-no-files-found: ignore
          retention-days: 14
          compression-level: 0
