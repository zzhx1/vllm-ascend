          VLLM_WORKER_MULTIPROC_METHOD: spawn
        shell: bash
        run: |
          set -o pipefail
          python3 -m pip uninstall -y triton-ascend
          pytest -sv --durations=0 tests/e2e/multicard/2-cards/test_aclgraph_capture_replay.py \
